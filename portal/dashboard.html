<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcano Dashboard | Inteligencia Operativa</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="portal.css">
    <style>
        :root {
            --primary: #55e6a5;
            --bg-dark: #050507;
            --card-bg: rgba(255, 255, 255, 0.03);
        }
        
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: fixed;
        }

        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 3rem;
            max-width: 1200px;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            color: #fff;
            text-decoration: none;
        }

        .logo .dot { color: var(--primary); }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .nav-item.active, .nav-item:hover {
            background: rgba(85, 230, 165, 0.1);
            color: var(--primary);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
        }

        .chart-container {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 24px;
            margin-bottom: 2rem;
        }

        .badge {
            background: rgba(85, 230, 165, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="../index.html" class="logo">ARCANO<span class="dot">.</span></a>
        <nav>
            <a href="#" class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="#" class="nav-item"><i class="fas fa-robot"></i> Mis Agentes</a>
            <a href="#" class="nav-item"><i class="fas fa-server"></i> Google Cloud</a>
            <a href="#" class="nav-item"><i class="fas fa-history"></i> Logs Neurales</a>
            <a href="../index.html" class="nav-item" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header">
            <div>
                <h1 style="font-family: 'Space Grotesk'; margin: 0;">Panel de Control <span class="badge">V2.5 LIVE</span></h1>
                <p style="color: #94a3b8; margin-top: 5px;">Bienvenido, <span id="client-name">Cliente Arcano</span></p>
            </div>
            <div class="google-partner-tag" style="background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Google_Cloud_logo.svg" height="15">
                <span style="font-size: 0.8rem; font-weight: 600;">Premier Partner</span>
            </div>
        </div>

        <div class="grid-stats">
            <div class="stat-card">
                <h3>Tokens Usados</h3>
                <div class="value" id="val-usage">0</div>
            </div>
            <div class="stat-card">
                <h3>Créditos GCP</h3>
                <div class="value" style="color: #60a5fa;">$ <span id="val-credits">0</span></div>
            </div>
            <div class="stat-card">
                <h3>Eficiencia Neural</h3>
                <div class="value" style="color: var(--primary);"><span id="val-efficiency">0</span>%</div>
            </div>
            <div class="stat-card">
                <h3>Bots Activos</h3>
                <div class="value" id="val-bots">0</div>
            </div>
        </div>

        <div class="chart-container">
            <h3 style="margin-top: 0; margin-bottom: 2rem;">Actividad de IA en Tiempo Real</h3>
            <canvas id="aiChart" height="100"></canvas>
        </div>
    </main>

    <script>
        // Cargar datos del usuario desde localStorage
        document.getElementById('client-name').textContent = localStorage.getItem('user_name') || 'Cliente Estratégico';

        async function loadDashboardData() {
            try {
                const res = await fetch('/api/dashboard_data');
                const data = await res.json();

                document.getElementById('val-usage').textContent = data.ai_usage.reduce((a,b) => a+b, 0) + 'k';
                document.getElementById('val-credits').textContent = data.cloud_credits.toFixed(2);
                document.getElementById('val-efficiency').textContent = data.neural_efficiency;
                document.getElementById('val-bots').textContent = data.active_bots;

                // Inicializar Chart
                const ctx = document.getElementById('aiChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'],
                        datasets: [{
                            label: 'Peticiones Neurales',
                            data: data.ai_usage,
                            borderColor: '#55e6a5',
                            backgroundColor: 'rgba(85, 230, 165, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { display: false },
                            x: { grid: { display: false }, ticks: { color: '#64748b' } }
                        }
                    }
                });
            } catch (e) { console.error("Error loading dash:", e); }
        }

        loadDashboardData();
    </script>
</body>
</html>
