<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Clientes | Arcano Solutions</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #050507;
            background-image:
                radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15), transparent 40%),
                radial-gradient(circle at 0% 50%, rgba(139, 92, 246, 0.08), transparent 30%);
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 2;
        }

        .login-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            text-decoration: none;
            letter-spacing: -0.05em;
        }

        .login-logo .dot {
            color: #3b82f6;
            font-size: 2.5rem;
            line-height: 0;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            transition: 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-login-submit {
            width: 100%;
            padding: 1rem;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
            font-size: 1rem;
        }

        .btn-login-submit:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(255, 255, 255, 0.2);
        }

        .links {
            margin-top: 2rem;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
        }

        .links a {
            color: #94a3b8;
            text-decoration: none;
            transition: 0.3s;
        }

        .links a:hover {
            color: #fff;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            mask-image: radial-gradient(circle at center, black 0%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 0%, transparent 80%);
        }
    </style>
</head>

<body>

    <div class="bg-grid"></div>

    <div class="login-card">
        <a href="index_es.html" class="login-logo">ARCANO<span class="dot">.</span></a>
        <p class="subtitle">Acceso seguro a Portal Cliente v2.0</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Corporativo</label>
                <input type="email" id="email" placeholder="nombre@empresa.com" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login-submit">Iniciar Sesión</button>
        </form>

        <div class="links">
            <a href="index_es.html">← Volver</a>
            <a href="signup.html">Crear Cuenta</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Autenticando...';
            btn.disabled = true;

            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    localStorage.setItem('user_name', result.user.name);
                    localStorage.setItem('user_role', result.user.role);
                    window.location.href = result.redirect;
                } else {
                    alert(result.message);
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error de conexión con el servidor de Arcano.');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
